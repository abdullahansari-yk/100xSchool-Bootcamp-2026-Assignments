<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taskify</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>
    <div id="main">
        <div id="todo">
            <div class="top">
                <div class="topTitle">To do</div>
                <div> <img src="image.png" alt=""></div>
            </div>
            <div class="cards todoCards">
                <div class="card">
                    <div class="title">To do</div>
                    <div class="description">To do do do do do do do</div>
                </div>
                <div class="card">
                    <div class="title">To do</div>
                    <div class="description">To do do do do do do do</div>
                </div>

            </div>

            <div class="AddBtn">
                <div>Add new</div>
                <div>+</div>
            </div>
        </div>

        <div id="inProgress">
            <div class="top">
                <div class="topTitle">In Progress</div>
                <div> <img src="image.png" alt=""></div>
            </div>
            <div class="cards inProgressCards">
                <div class="card">
                    <div class="title">To do</div>
                    <div class="description">To do do do do do do do</div>
                </div>

            </div>

            <div class="AddBtn">
                <div>Add new</div>
                <div>+</div>
            </div>
        </div>

        <div id="underReview">
            <div class="top">
                <div class="topTitle">Under Review</div>
                <div> <img src="image.png" alt=""></div>
            </div>
            <div class="cards underReviewCards">
                <div class="card">
                    <div class="title">To do</div>
                    <div class="description">To do do do do do do do</div>
                </div>
                <div class="card">
                    <div class="title">To do</div>
                    <div class="description">To do do do do do do do</div>
                </div>
            </div>



            <div class="AddBtn">
                <div>Add new</div>
                <div>+</div>
            </div>
        </div>

        <div id="finished">
            <div class="top">
                <div class="topTitle">Finished</div>
                <div> <img src="image.png" alt=""></div>
            </div>
            <div class="cards finishedCards">
                <div class="card">
                    <div class="title">To do</div>
                    <div class="description">To do do do do do do do</div>
                </div>
                <div class="card">
                    <div class="title">To do</div>
                    <div class="description">To do do do do do do do</div>
                </div>
            </div>


            <div class="AddBtn">
                <div>Add new</div>
                <div>+</div>
            </div>
        </div>
    </div>
</body>
<script src="index.js"></script>

</html>
